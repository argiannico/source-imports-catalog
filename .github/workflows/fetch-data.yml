name: Fetch Vinosmith Data

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily (2 AM ET)
  workflow_dispatch:       # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch inventory from Vinosmith
        env:
          VINOSMITH_API_KEY: ${{ secrets.VINOSMITH_API_KEY }}
        run: node fetch-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update inventory data $(date -u +%Y-%m-%d)"
          git push
