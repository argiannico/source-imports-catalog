<title>The Source Imports — Inventory</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#003049;--navy-light:#004a6e;
  --bg:#f3f4f6;--white:#ffffff;
  --text:#1a1a2e;--text-2:#4b5563;--text-3:#9ca3af;
  --border:#e5e7eb;--border-2:#d1d5db;
  --green:#059669;--amber:#d97706;--red:#dc2626;
  --blue:#2563eb;
  --fr:#2C5282;--it:#9B2C2C;--es:#92600e;--pt:#276749;--at:#702459;--de:#2D6A4F;
  --radius:8px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
html{font-family:var(--font);font-size:14px;color:var(--text);-webkit-font-smoothing:antialiased}
body{background:var(--bg);min-height:100vh}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:100;background:var(--navy);height:56px;display:flex;align-items:center;padding:0 24px;gap:16px}
.logo{color:#fff;font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.logo span{opacity:.5;font-weight:400;letter-spacing:.08em;margin-left:8px;font-size:11px}
.search-wrap{flex:1;max-width:480px;margin:0 auto;position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9ca3af;pointer-events:none}
.search-input{width:100%;height:36px;border:none;border-radius:6px;padding:0 12px 0 38px;font-size:13px;font-family:var(--font);background:#fff;color:var(--text);outline:none}
.search-input::placeholder{color:#9ca3af}
.search-input:focus{box-shadow:0 0 0 2px rgba(37,99,235,.4)}
.header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.header-badge{color:rgba(255,255,255,.6);font-size:11px;font-weight:500;letter-spacing:.04em;white-space:nowrap}
.cart-btn{position:relative;background:none;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:#fff;cursor:pointer;padding:6px 12px;font-size:13px;font-family:var(--font);display:flex;align-items:center;gap:6px;transition:all .15s}
.cart-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4)}
.cart-btn .badge{background:#fff;color:var(--navy);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.cart-btn .badge:empty{display:none}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:256px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;position:sticky;top:56px;height:calc(100vh - 56px)}
.main{flex:1;padding:20px 24px 40px;min-width:0}

/* ── SIDEBAR FILTERS ── */
.filter-group{padding:0 16px;margin-bottom:4px}
.filter-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;cursor:pointer;user-select:none;border:none;background:none;width:100%;font-family:var(--font);text-align:left}
.filter-title{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2)}
.filter-chevron{color:var(--text-3);transition:transform .2s;font-size:10px}
.filter-header[aria-expanded="false"] .filter-chevron{transform:rotate(-90deg)}
.filter-list{list-style:none;padding-bottom:8px;border-bottom:1px solid var(--border)}
.filter-list.collapsed{display:none}
.filter-item{display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;font-size:13px;color:var(--text)}
.filter-item:hover{color:var(--blue)}
.filter-item input{accent-color:var(--navy);width:14px;height:14px;cursor:pointer;flex-shrink:0}
.filter-item .count{color:var(--text-3);font-size:11px;margin-left:auto}
.filter-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.clear-filters{display:none;margin:12px 16px 4px;padding:6px 12px;font-size:12px;font-family:var(--font);color:var(--blue);background:none;border:1px solid var(--blue);border-radius:4px;cursor:pointer;text-align:center;width:calc(100% - 32px)}
.clear-filters:hover{background:rgba(37,99,235,.06)}
.clear-filters.visible{display:block}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.result-count{font-size:13px;color:var(--text-2)}
.result-count strong{color:var(--text);font-weight:600}
.sort-controls{display:flex;align-items:center;gap:4px}
.sort-label{font-size:12px;color:var(--text-3);margin-right:4px}
.sort-btn{padding:5px 10px;font-size:12px;font-family:var(--font);background:var(--white);border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text-2);transition:all .15s}
.sort-btn:hover{border-color:var(--border-2);color:var(--text)}
.sort-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── CARD GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:var(--border-2)}
.card-accent{height:4px;flex-shrink:0}
.card-body{padding:14px 16px 12px;flex:1;display:flex;flex-direction:column}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px}
.producer{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.vintage{font-size:12px;color:var(--text-3);font-weight:500;flex-shrink:0;padding-top:1px}
.wine-name{font-size:13.5px;color:var(--text);line-height:1.4;margin-bottom:8px;min-height:38px}
.meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:11px;padding:2px 8px;border-radius:3px;background:var(--bg);color:var(--text-2);white-space:nowrap}
.tag.country{font-weight:600}

/* ── PRICING ── */
.pricing{border-top:1px solid var(--border);padding-top:10px;margin-top:auto}
.price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.fl-price{font-size:17px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
.per-case{font-size:11px;color:var(--text-3);font-weight:400}
.net-badge{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text-3);background:var(--bg);padding:1px 6px;border-radius:3px}
.disc-row{display:flex;gap:12px;margin-bottom:2px}
.disc{font-size:11.5px;color:var(--text-2);font-variant-numeric:tabular-nums}
.disc strong{font-weight:600;color:var(--text)}

/* ── CARD FOOTER ── */
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.stock{display:flex;align-items:center;gap:5px;font-size:12px;font-variant-numeric:tabular-nums}
.stock-dot{width:7px;height:7px;border-radius:50%}
.stock.high .stock-dot{background:var(--green)}
.stock.med .stock-dot{background:var(--amber)}
.stock.low .stock-dot{background:var(--red)}
.stock.out{color:var(--text-3)}
.stock.out .stock-dot{background:var(--border-2)}
.wine-code{font-size:10.5px;color:var(--text-3);letter-spacing:.03em;font-family:"SF Mono",ui-monospace,"Cascadia Code",Consolas,monospace}
.producer-link{cursor:pointer;text-decoration:none;color:inherit;border-bottom:1px dashed var(--border-2);transition:border-color .15s}
.producer-link:hover{border-color:var(--navy);color:var(--navy)}

/* ── PRODUCER MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;justify-content:center;align-items:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.modal-head{padding:20px 24px 16px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border)}
.modal-head-info{flex:1}
.modal-producer-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.modal-region{font-size:13px;color:var(--text-2)}
.modal-close{background:none;border:none;font-size:24px;color:var(--text-3);cursor:pointer;padding:0 0 0 12px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{overflow-y:auto;padding:0 24px 24px;flex:1}
.modal-section{margin-top:16px}
.modal-section-title{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.modal-desc{font-size:13.5px;line-height:1.65;color:var(--text-2)}
.modal-toggle{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:var(--font);font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;padding:8px 0}
.modal-toggle:hover{text-decoration:underline}
.modal-toggle .chevron{font-size:10px;transition:transform .2s}
.modal-toggle[aria-expanded="true"] .chevron{transform:rotate(90deg)}
.modal-desc-wrap{display:none;margin-top:4px}
.modal-desc-wrap.open{display:block}
.modal-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--navy);text-decoration:none;padding:8px 0;margin-top:4px}
.modal-link:hover{text-decoration:underline}
.modal-link svg{flex-shrink:0}
.modal-wine-list{list-style:none;margin:0}
.modal-wine-item{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border);gap:12px;font-size:13px}
.modal-wine-item:last-child{border-bottom:none}
.modal-wine-name{color:var(--text);line-height:1.3;flex:1;min-width:0}
.modal-wine-name span{color:var(--text-3);font-size:12px}
.modal-wine-price{font-weight:600;color:var(--navy);white-space:nowrap;font-variant-numeric:tabular-nums}
.modal-wine-add{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--white);color:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .15s}
.modal-wine-add:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.add-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--white);color:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:400;transition:all .15s;flex-shrink:0;line-height:1}
.add-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.add-btn.in-cart{background:var(--navy);color:#fff;border-color:var(--navy);font-size:11px;font-weight:700}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--text-3)}
.empty h3{font-size:16px;color:var(--text-2);margin-bottom:6px}
.empty p{font-size:13px}

/* ── ORDER DRAWER ── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:-420px;width:420px;max-width:100vw;height:100vh;background:var(--white);z-index:201;display:flex;flex-direction:column;transition:right .25s ease;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.drawer.open{right:0}
.drawer-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--navy);color:#fff}
.drawer-title{font-size:15px;font-weight:700;letter-spacing:.04em}
.drawer-close{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:22px;padding:0 4px;line-height:1}
.drawer-close:hover{color:#fff}
.drawer-body{flex:1;overflow-y:auto;padding:0}
.drawer-empty{text-align:center;padding:60px 20px;color:var(--text-3);font-size:13px}
.order-item{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:flex-start}
.order-item-info{flex:1;min-width:0}
.order-item-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px}
.order-item-wine{font-size:12px;color:var(--text-2);line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-item-price{font-size:13px;font-weight:600;color:var(--navy);font-variant-numeric:tabular-nums}
.order-item-tier{font-size:10px;color:var(--text-3);font-weight:400;margin-left:4px}
.order-item-wh{font-size:10px;color:var(--text-3);margin-top:2px}
.qty-controls{display:flex;align-items:center;gap:0;flex-shrink:0}
.qty-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.qty-btn:hover{background:var(--border)}
.qty-btn.minus{border-radius:4px 0 0 4px}
.qty-btn.plus{border-radius:0 4px 4px 0}
.qty-val{width:36px;height:28px;border:1px solid var(--border);border-left:none;border-right:none;text-align:center;font-size:13px;font-weight:600;font-family:var(--font);color:var(--text);background:var(--white);font-variant-numeric:tabular-nums}
.order-remove{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:11px;padding:2px 0;margin-top:2px}
.order-remove:hover{color:var(--red)}
.drawer-footer{padding:16px 20px;border-top:1px solid var(--border);background:var(--bg)}
.order-total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.order-total-label{font-size:14px;font-weight:600;color:var(--text)}
.order-total-val{font-size:20px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
.order-total-cases{font-size:12px;color:var(--text-2);margin-bottom:12px}
.order-actions{display:flex;gap:8px}
.order-action-btn{flex:1;padding:10px;border-radius:6px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;text-align:center;transition:all .15s}
.btn-copy{background:var(--navy);color:#fff;border:none}
.btn-copy:hover{background:var(--navy-light)}
.btn-clear{background:var(--white);color:var(--text-2);border:1px solid var(--border)}
.btn-clear:hover{border-color:var(--red);color:var(--red)}
.copied-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--navy);color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .3s ease;z-index:300;pointer-events:none}
.copied-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FOOTER ── */
.footer{padding:24px;text-align:center;font-size:11px;color:var(--text-3);border-top:1px solid var(--border);background:var(--white);letter-spacing:.02em}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{display:none}
  .mobile-filter-toggle{display:flex!important}
  .sidebar.open{display:block;position:fixed;top:56px;left:0;z-index:90;width:280px;height:calc(100vh - 56px);box-shadow:4px 0 20px rgba(0,0,0,.12)}
  .mob-overlay{display:block!important;position:fixed;inset:0;top:56px;background:rgba(0,0,0,.3);z-index:89}
  .drawer{width:100vw}
}
@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .header{padding:0 12px;gap:10px}
  .logo span{display:none}
  .main{padding:14px 12px 32px}
  .header-badge{display:none}
}
.mobile-filter-toggle{display:none;align-items:center;gap:6px;padding:6px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--font);color:#fff;flex-shrink:0}
.mob-overlay{display:none}
</style>

<!-- HEADER -->
<header class="header">
  <div class="logo">The Source Imports<span>New York</span></div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="search" placeholder="Search wines, producers, regions…" autocomplete="off">
  </div>
  <div class="header-right">
    <button class="mobile-filter-toggle" onclick="toggleMobileSidebar()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="16" y2="12"/><line x1="4" y1="18" x2="12" y2="18"/></svg>
      Filters
    </button>
    <div class="header-badge">Distributor · Case</div>
    <button class="cart-btn" id="cartBtn" onclick="toggleDrawer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Order <span class="badge" id="cartBadge"></span>
    </button>
  </div>
</header>

<div class="mob-overlay" id="mobOverlay" onclick="toggleMobileSidebar()"></div>
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>

<!-- ORDER DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <span class="drawer-title">Your Order</span>
    <button class="drawer-close" onclick="toggleDrawer()">&times;</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter" style="display:none">
    <div class="order-total">
      <span class="order-total-label">Total</span>
      <span class="order-total-val" id="orderTotal"></span>
    </div>
    <div class="order-total-cases" id="orderCases"></div>
    <div class="order-actions">
      <button class="order-action-btn btn-copy" onclick="copyOrder()">Copy Order</button>
      <button class="order-action-btn btn-clear" onclick="clearOrder()">Clear</button>
    </div>
  </div>
</div>

<div class="copied-toast" id="toast">Order copied to clipboard</div>

<!-- PRODUCER MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-info">
        <div class="modal-producer-name" id="modalName"></div>
        <div class="modal-region" id="modalRegion"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-section" id="modalAboutSection">
        <button class="modal-toggle" id="modalToggle" onclick="toggleDesc()" aria-expanded="false">
          <span class="chevron">▶</span> About the Producer
        </button>
        <div class="modal-desc-wrap" id="modalDescWrap">
          <div class="modal-desc" id="modalDesc"></div>
        </div>
      </div>
      <div id="modalLinkWrap" class="modal-section" style="margin-top:8px"></div>
      <div class="modal-section">
        <div class="modal-section-title">Wines in Catalog</div>
        <ul class="modal-wine-list" id="modalWines"></ul>
      </div>
    </div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="toolbar">
      <div class="result-count" id="resultCount"></div>
      <div class="sort-controls">
        <span class="sort-label">Sort:</span>
        <button class="sort-btn active" data-sort="producer">Producer</button>
        <button class="sort-btn" data-sort="price-asc">Price ↑</button>
        <button class="sort-btn" data-sort="price-desc">Price ↓</button>
        <button class="sort-btn" data-sort="stock">Stock</button>
        <button class="sort-btn" data-sort="vintage">Vintage</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      <h3>No wines match your filters</h3>
      <p>Try adjusting your search or clearing some filters.</p>
    </div>
  </main>
</div>

<footer class="footer">The Source Imports · Distributor pricing, per case · Updated July 2026</footer>

<script>
var COUNTRY_COLORS={France:"var(--fr)",Italy:"var(--it)",Spain:"var(--es)",Portugal:"var(--pt)",Austria:"var(--at)",Germany:"var(--de)"};

var WINES=[];
var _FALLBACK=[];

var WH_LABELS={"FDL":"Fond du Lac – NJ","ZPH":"Zephyr Express – CA","MHW":"MHW Fond du Lac"};

var PRODUCERS={
"Alexandre Déramé":{url:"alexandre-derame",region:"Loire Valley, France",desc:"Alexandre Déramé is a humble winemaker in the Loire Valley's Muscadet region who took over his family estate after completing enology school in Nantes. His operation focuses on extremely low yields, particularly in his prized Clos des Roches Gaudinières vineyard, which he began converting to organic farming in 2023."},
"Anthony Thevenet":{url:"anthony-thevenet",region:"Beaujolais, France",desc:"Anthony Thevenet began his career in 2013 after apprenticing with renowned natural winemakers Georges Descombes and Jean Foillard. He and his father are slowly converting their nine hectares of vines to organic culture while producing nearly ten wines annually from old-vine Gamay parcels in Morgon and Chénas. Whole-bunch fermentation, spontaneous fermentation, minimal sulfite additions, and no fining or filtration."},
"Aseginolaza y Leunda":{url:"aseginolaza-y-leunda",region:"Navarra, Spain",desc:"Environmental biologists Jon Aseginolaza and Pedro Leunda launched their collaborative winery in 2017, focusing on recovering old vineyards planted with indigenous ancient vines across Navarra's northern subregions. Their approach emphasizes natural farming and producing fresh, terroir-driven wines with lower alcohol levels, primarily from Garnacha on limestone-rich soils at high altitudes."},
"Augalevada":{url:"fazenda-augalevada",region:"Ribeiro, Spain",desc:"Iago Garrido, a former professional soccer player, has established himself as an innovative winemaker in Spain's Ribeiro region. His distinctive approach centers on harnessing flor yeast combined with biodynamic farming and minimal sulfur use across indigenous Galician grape varieties. Garrido's razor-sharp attention to detail has positioned him as a rising influential figure in the natural wine world."},
"Baraldo":{url:null,region:"Tuscany, Italy",desc:"A small artisan producer in Tuscany working with traditional local varieties including Trebbiano and Malvasia, crafting wines with minimal intervention that express the warmth and generosity of their terroir."},
"Bien de Altura":{url:"bien-de-altura",region:"Canary Islands, Spain",desc:"Founded in 2017 by Carmelo on Gran Canaria, Bien de Altura operates at exceptional altitudes of 1,100–1,460 meters on volcanic terrain. The producer specializes in wines with a global cult following, made primarily from own-rooted Listán Negro using minimal intervention — whole-bunch fermentations and extended macerations in neutral vessels with minimal sulfites."},
"Cartaux Bougaud":{url:"cartaux-bougaud",region:"Jura, France",desc:"Sébastien and Sandrine Cartaux operate a 20-hectare organic-certified estate in Jura, producing primarily Chardonnay and Savagnin whites alongside Poulsard, Trousseau, and Pinot Noir reds. The domaine employs both traditional aging methods and the region's distinctive oxidative processes to craft classically styled wines emphasizing terroir expression."},
"Castellengo":{url:"castello-di-castellengo",region:"Alto Piemonte, Italy",desc:"Castello di Castellengo is an organically farmed winery in Piedmont's Alto Piemonte region, owned by Magda and Alessandro Ciccioni. Located on volcanic marine sand soils near Biella, the estate produces refined Nebbiolo and Erbaluce wines using concrete tanks and large oak barrels, blending tradition with modern sensibility."},
"Chardigny":{url:"domaine-chardigny",region:"Beaujolais, France",desc:"Domaine Chardigny is a family-owned estate taken over in 2015 by brothers Pierre-Maxime and Victor-Emmanuel. The domaine operates 20 hectares of organically certified vineyards in Saint-Amour and Saint-Véran, producing Chardonnay from limestone soils and Gamay from volcanic rock."},
"Christophe":{url:"domaine-christophe-et-fils",region:"Chablis, France",desc:"Sébastien Christophe began winemaking in 1999 with a half-hectare parcel inherited from his grandfather and has since methodically expanded. All his vineyard parcels are located on the right bank of the Serein River in Chablis, producing classically spare and mineral-driven wines using organic practices, spontaneous fermentation, and minimal oak."},
"Demougeot":{url:"rodolphe-demougeot",region:"Côte de Beaune, France",desc:"Demougeot owns eight hectares principally in Meursault and Pommard, producing wines of pure and unpretentious character. Organic viticulture guided by lunar cycles; hand-harvested with severe cluster selection using horses on premium sites like Pommard Les Charmots. Whites undergo whole-cluster pressing with natural fermentation in old oak; reds ferment without stems. Sulfites added solely at bottling."},
"Domaine de la Lande":{url:"domaine-de-la-lande",region:"Loire Valley, France",desc:"An organic-certified winery in Bourgueil operated by François Delaunay, representing the latest generation of his family's vineyard. The estate produces classic Loire Valley Cabernet Franc at their vin de garde finest — beautiful when young, and even more striking after decades in the bottle. Made traditionally through destemming and aging in large French oak foudres."},
"Forteresse de Berrye":{url:"forteresse-de-berrye",region:"Loire Valley, France",desc:"Located in Saumur and owned by Gilles Colinet, an agronomist who converted the property to organic farming starting in 2019. The winery occupies a historic 12th-century fortress positioned on elevated terrain with yellowish tuffeau limestone soils. The estate emphasizes biodiversity through agroforestry, focusing on Chenin Blanc and Cabernet Franc with minimal intervention."},
"Hajszan Neumann":{url:"hajszan-neumann",region:"Wien, Austria",desc:"A Vienna-based winery operated by Fritz Wieninger, managing biodynamically farmed vineyards on the Nussberg hillside. The estate produces two distinct lines: classically styled wines emphasizing mineral precision, and experimental natural wines fermented on skins with extended maceration in amphora or concrete without added sulfites."},
"Jardins de Fleury":{url:"carole-kohler-jardins-de-fleury",region:"Loire Valley, France",desc:"Carole Kohler is a former chemist who revitalized the historic 15th-century Fleury estate in Thouars, crafting organic and biodynamic wines with no added sulfites. Working alongside her architect husband Brice, she produces Chenin Blanc on schists of the Massif Armorican and Cabernet Franc on Jurassic Tourcian limestone."},
"Le Vent des Jours":{url:"le-vent-des-jours",region:"Cahors, France",desc:"Laurent Marre, a former Paris sommelier, returned to his native Cahors after a health crisis to pursue his winemaking dream. He and his wife Nathalie operate eight biodynamic hectares on a limestone plateau, crafting impeccably balanced natural wines with no added sulfites. The range highlights mineral Gros Manseng and elegant, terroir-focused Malbecs."},
"Madonna delle Grazie":{url:"cantina-madonna-delle-grazie",region:"Basilicata, Italy",desc:"Brothers Paolo and Michele Latoracca, both trained enologists, work alongside their father Giuseppe to craft authentic, organically farmed, volcanic Aglianico wines from their vineyards in Venosa. All wines are made from massal selections rather than commercial clones. The cantina began bottling in 2003 after nearly a century of selling grapes exclusively."},
"Marengo":{url:null,region:"Piedmont, Italy",desc:"A respected family estate in La Morra producing traditional Barolo and other Langhe wines. Their holdings include prized vineyards in the Ravera cru, one of Barolo's most celebrated sites. The wines are crafted with classical methods — extended maceration and aging in large Slavonian oak botti."},
"Menina d'Uva":{url:"menina-duva",region:"Trás-os-Montes, Portugal",desc:"Founded by Aline Domingues, who relocated from Paris in 2017 to revitalize ancestral vineyards in her family's village of Uva. The operation emphasizes indigenous local grape varieties farmed organically on metamorphic bedrock at 550 meters elevation, crafting minimal-intervention wines with low sulfite levels."},
"Moldes":{url:"manuel-moldes",region:"Rías Baixas, Spain",desc:"Manuel Moldes is one of Rías Baixas' most accomplished winemakers, renowned for his technically proficient Albariño wines that express distinct terroir characteristics through soil type differentiation. His portfolio emphasizes wines from specific vineyard sites — whether granite or schist — aged in old French oak. Also produces compelling reds from Espadeiro and Caiño."},
"Muthenthaler":{url:null,region:"Wachau, Austria",desc:"A small artisan producer in the Wachau crafting precise, terroir-driven Grüner Veltliner and Riesling from steep, terraced vineyards along the Danube. Known for meticulous vineyard work and extended lees aging that yields wines of remarkable depth and mineral complexity."},
"Pedro Mendez":{url:"pedro-mendez",region:"Rías Baixas, Spain",desc:"Pedro Méndez works full-time in his family's vineyards in the Val do Salnés subzone while also running their restaurant during summer months. He produces distinctive wines from ancient pre-phylloxera Albariño vines — nearly two centuries old — creating full-bodied Albariños with structure and pure citrusy, salty, minerally character."},
"Ramos":{url:"constantino-ramos",region:"Vinho Verde, Portugal",desc:"Constantino Ramos is a former pharmacist turned winemaker who started his project in 2016 in Portugal's Monção e Melgaço region. He sources high-altitude, old-vine parcels of indigenous red grapes and operates as an uncertified naturalist using sustainable farming methods on granite soils."},
"Sainas":{url:null,region:"Ribeira Sacra, Spain",desc:"A small grower in Ribeira Sacra working the region's dramatic terraced vineyards carved into steep river gorges. The wines are made from old-vine Mencía and other local varieties, fermented with indigenous yeasts and aged in neutral vessels to preserve the purity of the fruit and the distinctive mineral signature of the granite soils."},
"Seoane Novelle":{url:null,region:"Ribeira Sacra, Spain",desc:"An artisan producer in Ribeira Sacra crafting single-varietal Mencía wines from old vines on the steep, terraced slopes above the Sil and Miño rivers. Minimal intervention in both vineyard and cellar allows the wines to express the granitic terroir and cool-climate freshness of this dramatic region."},
"Sorgente":{url:null,region:"Veneto/Friuli, Italy",desc:"A family-run estate in northeastern Italy producing approachable, everyday wines including Prosecco and Pinot Grigio. The focus is on clean, fresh expressions of the region's classic varieties at accessible price points."},
"Tegernseerhof":{url:null,region:"Wachau, Austria",desc:"One of the Wachau's historic estates, Tegernseerhof has been producing wines since the 12th century. The estate's terraced vineyards along the Danube yield structured, mineral Grüner Veltliner and Riesling in both Federspiel and Smaragd categories. Known for exceptional site-specific wines from premier Ried parcels."},
"Wechsler":{url:null,region:"Rheinhessen, Germany",desc:"A rising star in Rheinhessen producing site-specific Rieslings from some of the region's greatest vineyards including Morstein and Kirchspiel. The wines are crafted with precision and restraint, fermented with indigenous yeasts in neutral vessels to let the distinctive limestone and clay terroirs speak clearly."}
};
var activeFilters={country:new Set(),region:new Set(),producer:new Set(),warehouse:new Set()};
var currentSort="producer";
var order={};

function getWinePrice(wine,qty){
  if(qty>=3&&wine.p3)return wine.p3;
  if(qty>=2&&wine.p2)return wine.p2;
  return wine.p1;
}
function getTierLabel(wine,qty){
  if(qty>=3&&wine.p3)return "10%";
  if(qty>=2&&wine.p2)return "5%";
  return "FL";
}

function buildSidebar(){
  var counts={warehouse:{},country:{},region:{},producer:{}};
  WINES.forEach(function(w){
    var whl=WH_LABELS[w.wh]||w.wh;
    counts.warehouse[whl]=(counts.warehouse[whl]||0)+1;
    counts.country[w.co]=(counts.country[w.co]||0)+1;
    if(w.r)counts.region[w.r]=(counts.region[w.r]||0)+1;
    counts.producer[w.g]=(counts.producer[w.g]||0)+1;
  });
  var html='<button class="clear-filters" id="clearBtn" onclick="clearFilters()">Clear all filters</button>';
  html+=buildFilterGroup("Warehouse","warehouse",counts.warehouse,true);
  html+=buildFilterGroup("Country","country",counts.country,true);
  html+=buildFilterGroup("Region","region",counts.region,true);
  html+=buildFilterGroup("Producer","producer",counts.producer,false);
  document.getElementById("sidebar").innerHTML=html;
}

function buildFilterGroup(title,key,items,open){
  var sorted=Object.keys(items).sort();
  var h='<div class="filter-group"><button class="filter-header" aria-expanded="'+(open?"true":"false")+'" onclick="toggleFilter(this)">';
  h+='<span class="filter-title">'+title+'</span><span class="filter-chevron">▼</span></button>';
  h+='<ul class="filter-list'+(open?'':' collapsed')+'">';
  sorted.forEach(function(name){
    var dot=key==="country"?'<span class="dot" style="background:'+getColor(name)+'"></span>':'';
    h+='<label class="filter-item">'+
      '<input type="checkbox" data-key="'+key+'" data-val="'+name.replace(/"/g,'&quot;')+'" onchange="onFilter(this)">'+
      dot+'<span>'+name+'</span><span class="count">'+items[name]+'</span></label>';
  });
  h+='</ul></div>';
  return h;
}

function toggleFilter(btn){
  var expanded=btn.getAttribute("aria-expanded")==="true";
  btn.setAttribute("aria-expanded",expanded?"false":"true");
  btn.nextElementSibling.classList.toggle("collapsed",expanded);
}

function onFilter(cb){
  var set=activeFilters[cb.dataset.key];
  if(cb.checked)set.add(cb.dataset.val);else set.delete(cb.dataset.val);
  var any=activeFilters.country.size||activeFilters.region.size||activeFilters.producer.size||activeFilters.warehouse.size;
  document.getElementById("clearBtn").classList.toggle("visible",!!any);
  render();
}

function clearFilters(){
  activeFilters={country:new Set(),region:new Set(),producer:new Set(),warehouse:new Set()};
  document.querySelectorAll('.filter-item input').forEach(function(cb){cb.checked=false});
  document.getElementById("clearBtn").classList.remove("visible");
  render();
}

function getColor(country){return COUNTRY_COLORS[country]||"#888"}

function getFiltered(){
  var q=document.getElementById("search").value.toLowerCase().trim();
  return WINES.filter(function(w){
    if(activeFilters.warehouse.size){var whl=WH_LABELS[w.wh]||w.wh;if(!activeFilters.warehouse.has(whl))return false}
    if(activeFilters.country.size&&!activeFilters.country.has(w.co))return false;
    if(activeFilters.region.size&&!activeFilters.region.has(w.r))return false;
    if(activeFilters.producer.size&&!activeFilters.producer.has(w.g))return false;
    if(q){
      var hay=(w.g+" "+w.w+" "+w.co+" "+w.r+" "+w.c+" "+w.v).toLowerCase();
      if(hay.indexOf(q)===-1)return false;
    }
    return true;
  });
}

function sortWines(list){
  var s=currentSort;
  list.sort(function(a,b){
    if(s==="producer")return a.g.localeCompare(b.g)||a.w.localeCompare(b.w);
    if(s==="price-asc")return a.p1-b.p1;
    if(s==="price-desc")return b.p1-a.p1;
    if(s==="stock")return b.s-a.s;
    if(s==="vintage"){var av=a.v==="NV"?0:parseInt(a.v),bv=b.v==="NV"?0:parseInt(b.v);return bv-av}
    return 0;
  });
  return list;
}

function fmtPrice(n){if(!n)return null;return"$"+n.toFixed(2)}
function fmtPriceShort(n){if(!n)return"";return"$"+n.toFixed(2)}

function renderCard(w){
  var isNet=!w.p2&&!w.p3;
  var stockClass=w.s<=0?"out":w.s<=2?"low":w.s<=5?"med":"high";
  var stockText=w.s<=0?"Allocated":w.s+" avail";
  var inCart=order[w.c];
  var discHtml="";
  if(w.p2||w.p3){
    discHtml='<div class="disc-row">';
    if(w.p2)discHtml+='<span class="disc"><strong>2+ cs</strong> '+fmtPrice(w.p2)+'</span>';
    if(w.p3)discHtml+='<span class="disc"><strong>3+ cs</strong> '+fmtPrice(w.p3)+'</span>';
    discHtml+='</div>';
  }
  return '<div class="card">'+
    '<div class="card-accent" style="background:'+getColor(w.co)+'"></div>'+
    '<div class="card-body">'+
      '<div class="card-top"><span class="producer"><a class="producer-link" onclick="openModal(\''+w.g.replace(/'/g,"\\'")+'\')">'+w.g+'</a></span><span class="vintage">'+w.v+'</span></div>'+
      '<div class="wine-name">'+w.w+'</div>'+
      '<div class="meta">'+
        '<span class="tag country">'+w.co+'</span>'+
        (w.r?'<span class="tag">'+w.r+'</span>':'')+
        '<span class="tag">12/750ml</span>'+
        '<span class="tag">'+(WH_LABELS[w.wh]||w.wh)+'</span>'+
      '</div>'+
      '<div class="pricing">'+
        '<div class="price-row">'+
          '<span class="fl-price">'+fmtPrice(w.p1)+'</span>'+
          '<span class="per-case">/cs</span>'+
          (isNet?'<span class="net-badge">NET</span>':'')+
        '</div>'+discHtml+
      '</div>'+
      '<div class="card-foot">'+
        '<span class="stock '+stockClass+'"><span class="stock-dot"></span>'+stockText+'</span>'+
        '<span class="wine-code">'+w.c+'</span>'+
        '<button class="add-btn'+(inCart?" in-cart":"")+'" onclick="addToOrder(\''+w.c+'\')" title="Add to order">'+(inCart?inCart.qty:"+")+'</button>'+
      '</div>'+
    '</div></div>';
}

function render(){
  var list=sortWines(getFiltered());
  var grid=document.getElementById("grid");
  var empty=document.getElementById("empty");
  document.getElementById("resultCount").innerHTML='<strong>'+list.length+'</strong> wine'+(list.length!==1?'s':'')+' available';
  if(!list.length){grid.innerHTML="";empty.style.display="block";return}
  empty.style.display="none";
  grid.innerHTML=list.map(renderCard).join("");
}

/* ── ORDER / CART ── */
function addToOrder(code){
  if(order[code]){order[code].qty++;} else {
    var wine=WINES.find(function(w){return w.c===code});
    if(wine)order[code]={qty:1,wine:wine};
  }
  updateCart();render();
}

function setQty(code,delta){
  if(!order[code])return;
  order[code].qty+=delta;
  if(order[code].qty<=0)delete order[code];
  updateCart();render();
}

function removeFromOrder(code){
  delete order[code];
  updateCart();render();
}

function clearOrder(){
  order={};
  updateCart();render();
}

function updateCart(){
  var keys=Object.keys(order);
  var badge=document.getElementById("cartBadge");
  badge.textContent=keys.length||"";
  var body=document.getElementById("drawerBody");
  var footer=document.getElementById("drawerFooter");

  if(!keys.length){
    body.innerHTML='<div class="drawer-empty">Add wines from the catalog to build your order.</div>';
    footer.style.display="none";
    return;
  }
  footer.style.display="block";
  var total=0,totalCases=0;
  var html="";
  keys.forEach(function(code){
    var item=order[code];
    var w=item.wine;
    var price=getWinePrice(w,item.qty);
    var tier=getTierLabel(w,item.qty);
    var lineTotal=price*item.qty;
    total+=lineTotal;
    totalCases+=item.qty;
    html+='<div class="order-item">'+
      '<div class="order-item-info">'+
        '<div class="order-item-name">'+w.g+'</div>'+
        '<div class="order-item-wine">'+w.w+'</div>'+
        '<div class="order-item-price">'+fmtPrice(lineTotal)+'<span class="order-item-tier"> '+tier+' ×'+item.qty+'</span></div>'+
        '<div class="order-item-wh">'+(WH_LABELS[w.wh]||w.wh)+' · '+w.c+'</div>'+
        '<button class="order-remove" onclick="removeFromOrder(\''+code+'\')">Remove</button>'+
      '</div>'+
      '<div class="qty-controls">'+
        '<button class="qty-btn minus" onclick="setQty(\''+code+'\',-1)">−</button>'+
        '<input class="qty-val" type="text" value="'+item.qty+'" readonly>'+
        '<button class="qty-btn plus" onclick="setQty(\''+code+'\',1)">+</button>'+
      '</div></div>';
  });
  body.innerHTML=html;
  document.getElementById("orderTotal").textContent=fmtPrice(total);
  document.getElementById("orderCases").textContent=totalCases+" case"+(totalCases!==1?"s":"")+" · "+keys.length+" wine"+(keys.length!==1?"s":"");
}

function toggleDrawer(){
  document.getElementById("drawer").classList.toggle("open");
  document.getElementById("drawerOverlay").classList.toggle("open");
}

function copyOrder(){
  var keys=Object.keys(order);
  if(!keys.length)return;
  var lines=["ORDER — The Source Imports",""];
  var total=0;
  keys.forEach(function(code){
    var item=order[code];
    var w=item.wine;
    var price=getWinePrice(w,item.qty);
    var tier=getTierLabel(w,item.qty);
    var lineTotal=price*item.qty;
    total+=lineTotal;
    lines.push(item.qty+"x  "+w.c+"  "+w.g+", "+w.w+(w.v&&w.v!=="NV"?" "+w.v:"")+"  "+fmtPriceShort(price)+"/cs ("+tier+")  = "+fmtPriceShort(lineTotal));
  });
  lines.push("");
  lines.push("TOTAL: "+fmtPriceShort(total));
  lines.push("Warehouse: "+(WH_LABELS["FDL"]||"FDL"));

  navigator.clipboard.writeText(lines.join("\n")).then(function(){
    var toast=document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(function(){toast.classList.remove("show")},2000);
  });
}

document.getElementById("search").addEventListener("input",render);
document.querySelectorAll(".sort-btn").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll(".sort-btn").forEach(function(b){b.classList.remove("active")});
    btn.classList.add("active");
    currentSort=btn.dataset.sort;
    render();
  });
});

function toggleMobileSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("mobOverlay").style.display=
    document.getElementById("sidebar").classList.contains("open")?"block":"none";
}

/* ── PRODUCER MODAL ── */
function openModal(name){
  var p=PRODUCERS[name]||{};
  document.getElementById("modalName").textContent=name;
  document.getElementById("modalRegion").textContent=p.region||"";

  var aboutSection=document.getElementById("modalAboutSection");
  var descWrap=document.getElementById("modalDescWrap");
  var toggle=document.getElementById("modalToggle");
  if(p.desc){
    aboutSection.style.display="block";
    document.getElementById("modalDesc").textContent=p.desc;
    descWrap.classList.remove("open");
    toggle.setAttribute("aria-expanded","false");
  } else {
    aboutSection.style.display="none";
  }

  var linkWrap=document.getElementById("modalLinkWrap");
  if(p.url){
    linkWrap.innerHTML='<a class="modal-link" href="https://thesourceimports.com/producers/'+p.url+'/" target="_blank" rel="noopener">'+
      'Visit on The Source Imports <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>';
  } else {
    linkWrap.innerHTML='';
  }

  var wines=WINES.filter(function(w){return w.g===name});
  wines.sort(function(a,b){return b.p1-a.p1});
  var html="";
  wines.forEach(function(w){
    html+='<li class="modal-wine-item">'+
      '<div class="modal-wine-name">'+w.w+' <span>'+w.v+'</span></div>'+
      '<span class="modal-wine-price">'+fmtPrice(w.p1)+'/cs</span>'+
      '<button class="modal-wine-add" onclick="addToOrder(\''+w.c+'\')" title="Add to order">+</button>'+
      '</li>';
  });
  document.getElementById("modalWines").innerHTML=html;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow="";
}

function toggleDesc(){
  var toggle=document.getElementById("modalToggle");
  var wrap=document.getElementById("modalDescWrap");
  var expanded=toggle.getAttribute("aria-expanded")==="true";
  toggle.setAttribute("aria-expanded",expanded?"false":"true");
  wrap.classList.toggle("open",!expanded);
}

document.addEventListener("keydown",function(e){if(e.key==="Escape"){closeModal();if(document.getElementById("drawer").classList.contains("open"))toggleDrawer()}});

function init(data){WINES=data;buildSidebar();render();}
fetch("data.json").then(function(r){return r.json()}).then(init).catch(function(){init(_FALLBACK)});
</script>
